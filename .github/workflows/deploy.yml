name: deploy

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        run: |
          python -m pip install -r requirements.txt
          npm install -g @mermaid-js/mermaid-cli@11.15.0

      - name: Show tool versions
        run: |
          python --version
          python -m pip --version
          python -m mkdocs --version
          node --version
          npm --version
          mmdc --version

      - name: Validate helper scripts
        run: |
          python scripts/check_nav.py
          python scripts/check_links.py
          python scripts/validate_assets.py

      - name: Build site
        run: |
          set -o pipefail
          python -m mkdocs build --strict --verbose 2>&1 | tee mkdocs-build.log

      - name: Upload Pages artifact
        if: ${{ github.event_name != 'pull_request' }}
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mkdocs-build-log
          path: mkdocs-build.log

  deploy:
    needs: build
    if: ${{ github.event_name != 'pull_request' }}
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
