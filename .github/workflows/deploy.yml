name: deploy

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        run: |
          python -m pip install -r requirements.txt
          npm install -g @mermaid-js/mermaid-cli@11.15.0

      - name: Cache Mermaid SVGs
        uses: actions/cache@v4
        with:
          path: docs/assets/mermaid
          key: ${{ runner.os }}-mermaid-svg-v1-${{ hashFiles('mkdocs.yml', 'requirements.txt', 'docs/**/*.md') }}
          restore-keys: |
            ${{ runner.os }}-mermaid-svg-v1-

      - name: Show tool versions
        run: |
          python --version
          python -m pip --version
          python -m mkdocs --version
          node --version
          npm --version
          mmdc --version

      - name: Detect docs lint scope
        id: docs-lint-scope
        env:
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          PUSH_BEFORE_SHA: ${{ github.event.before }}
        run: |
          set -euo pipefail
          : > docs-lint-files.txt
          : > docs-lint-changed-files.txt

          scope="changed"
          head_sha="$GITHUB_SHA"
          base_sha=""
          zero_sha="0000000000000000000000000000000000000000"

          if [ "$GITHUB_EVENT_NAME" = "pull_request" ]; then
            base_sha="$PR_BASE_SHA"
          elif [ "$GITHUB_EVENT_NAME" = "push" ]; then
            base_sha="$PUSH_BEFORE_SHA"
          else
            scope="all"
          fi

          if [ "$scope" = "changed" ]; then
            if [ -z "$base_sha" ] || [ "$base_sha" = "$zero_sha" ]; then
              scope="all"
            else
              case "$base_sha$head_sha" in
                *[!0-9a-fA-F]*)
                  echo "Invalid git SHA detected for docs lint scope." >&2
                  exit 1
                  ;;
              esac

              git diff --name-only --diff-filter=ACMR "$base_sha" "$head_sha" -- \
                docs mkdocs.yml DESIGN.md scripts/docs_lint_report.py > docs-lint-changed-files.txt

              if grep -Eq '^(mkdocs\.yml|DESIGN\.md|scripts/docs_lint_report\.py)$' docs-lint-changed-files.txt; then
                scope="all"
              else
                grep -E '^docs/.*\.md$' docs-lint-changed-files.txt > docs-lint-files.txt || true
              fi
            fi
          fi

          echo "scope=$scope" >> "$GITHUB_OUTPUT"
          echo "changed_count=$(wc -l < docs-lint-files.txt | tr -d ' ')" >> "$GITHUB_OUTPUT"

      - name: Generate docs lint report
        env:
          DOCS_LINT_SCOPE: ${{ steps.docs-lint-scope.outputs.scope }}
        run: |
          set -euo pipefail
          if [ "$DOCS_LINT_SCOPE" = "all" ]; then
            python scripts/docs_lint_report.py --github-annotations --output docs-lint-report.md
          else
            python scripts/docs_lint_report.py --github-annotations --paths-from docs-lint-files.txt --output docs-lint-report.md
          fi

          {
            echo "## Docs lint scope"
            if [ "$DOCS_LINT_SCOPE" = "all" ]; then
              echo "- Scope: full docs"
            else
              echo "- Scope: changed Markdown files"
              if [ -s docs-lint-files.txt ]; then
                sed 's/^/- `/' docs-lint-files.txt | sed 's/$/`/'
              else
                echo "- No changed Markdown files."
              fi
            fi
            echo
            cat docs-lint-report.md
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Validate helper scripts
        run: |
          python scripts/check_nav.py
          python scripts/check_links.py
          python scripts/validate_assets.py

      - name: Build site
        run: |
          set -o pipefail
          python scripts/build_cached.py --verbose 2>&1 | tee mkdocs-build.log

      - name: Upload Pages artifact
        if: ${{ github.event_name != 'pull_request' }}
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mkdocs-build-log
          path: mkdocs-build.log

      - name: Upload docs lint report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: docs-lint-report
          path: docs-lint-report.md
          if-no-files-found: ignore

  deploy:
    needs: build
    if: ${{ github.event_name != 'pull_request' }}
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
